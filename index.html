<!DOCTYPE html>
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Ais Tersayang</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#fff0f5,#ffe4ec);
overflow:hidden;
padding:20px;
}

.container{
max-width:500px;
}

/* glow nama */

.nama{
font-size:clamp(30px,6vw,45px);
color:#ff4f8b;
animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 5px #ff9cc3,0 0 10px #ff9cc3,0 0 15px #ff9cc3;
}
to{
text-shadow:0 0 10px #ff4f8b,0 0 20px #ff4f8b,0 0 30px #ff4f8b;
}
}

p{
margin-top:10px;
color:#555;
font-size:18px;
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:25px;
font-size:18px;
background:#ff7aa8;
color:white;
cursor:pointer;
transition:0.25s;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

button:hover{
transform:scale(1.05);
}

button:active{
transform:scale(0.9);
}

#pesan{
margin-top:25px;
font-size:20px;
color:#444;
opacity:0;
transition:0.5s;
}

/* bunga */

.bunga{
position:fixed;
top:-20px;
font-size:24px;
animation:jatuh 6s linear forwards;
}

@keyframes jatuh{
to{
transform:translateY(110vh);
}
}

/* hati */

.hati{
position:fixed;
font-size:22px;
animation:naik 2s forwards;
}

@keyframes naik{
0%{
opacity:1;
transform:translateY(0) scale(1);
}
100%{
opacity:0;
transform:translateY(-80px) scale(1.6);
}
}

</style>
</head>

<body>

<div class="container">

<h1 class="nama">Ais ✨</h1>

<p>Untuk Ais yang paling spesial di hatiku</p>

<button onclick="kasihPesan()">Klik kalau lagi pusing 💗</button>

<div id="pesan"></div>

</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6e1b6a7c16.mp3">
</audio>

<script>

let pesan = [
"Ais tersayang, tarik nafas pelan ya... semuanya akan baik-baik saja.",
"Ais manisku, kalau kamu lelah istirahatlah sebentar ya.",
"Untuk Ais yang selalu ada di hatiku, semoga pusingmu cepat hilang.",
"Ais sayangku, senyummu itu selalu membuat dunia terasa lebih hangat.",
"Ais tercinta, kamu adalah salah satu alasan kenapa hariku selalu indah."
]

function kasihPesan(){

let teks=document.getElementById("pesan")
let random=Math.floor(Math.random()*pesan.length)

teks.innerText=pesan[random]
teks.style.opacity=1

/* bunga */

for(let i=0;i<6;i++){
let bunga=document.createElement("div")
bunga.className="bunga"
bunga.innerHTML="🌸"
bunga.style.left=Math.random()*100+"%"
document.body.appendChild(bunga)

setTimeout(()=>bunga.remove(),6000)
}

/* hati */

for(let i=0;i<4;i++){
let hati=document.createElement("div")
hati.className="hati"
hati.innerHTML="💗"
hati.style.left=(window.innerWidth/2 + (Math.random()*120-60))+"px"
hati.style.top=(window.innerHeight/2)+"px"

document.body.appendChild(hati)

setTimeout(()=>hati.remove(),2000)
}

}

</script>

</body>
</html>
